services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DB_URL=sqlite:////app/data/app.db
      - UPLOAD_DIR=/app/uploads
      - FAISS_INDEX_PATH=/app/data/faiss_index
    volumes:
      - ./backend/uploads:/app/uploads
      - backend_db:/app/data
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  backend_db:
  ollama_data:
